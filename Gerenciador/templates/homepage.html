<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Gerenciador - Login</title>
</head>
<body >
    <h1>Gerenciador de Tarefas</h1>
    <h2>Login</h2>
    <form method="POST">
        {{ form.csrf_token() }}
        <p>{{ form.email.label }}<br>{{ form.email(size=30) }}</p>
        <p>{{ form.senha.label }}<br>{{ form.senha(size=30) }}</p>
        <p>{{ form.botao_confirmacao() }}</p>
    </form>
    <hr>
    <p>Não tem conta? <a href="{{ url_for('criarconta') }}">Cadastre-se aqui</a></p>
</body>
</html>
